name: dev-deploy (ACA FINAL FIXED)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: aca-master-${{ github.repository }}
  cancel-in-progress: true

env:
  RG_ENV: ${{ vars.RG_ENV }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_REPO: ${{ vars.ACR_REPO }}
  APP_NAME: ${{ vars.APP_NAME }}
  CAE_ENV: ${{ vars.CAE_ENV }}
  INGRESS_TYPE: ${{ vars.INGRESS_TYPE }}
  APP_PORT: ${{ vars.APP_PORT }}
  LOCATION: eastus

jobs:

# ==========================
# BUILD JOB
# ==========================
  build:
    runs-on: ubuntu-latest
    environment: master

    outputs:
      IMAGE: ${{ steps.set-image.outputs.IMAGE }}
      LOGIN_SERVER: ${{ steps.acr.outputs.LOGIN_SERVER }}

    steps:

    - name: Debug Secrets
      run: |
        echo "CLIENT_ID=${{ secrets.AZURE_CLIENT_ID != '' }}"
        echo "TENANT_ID=${{ secrets.AZURE_TENANT_ID != '' }}"
        echo "SUBSCRIPTION_ID=${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}"

    - name: Clean Workspace
      run: rm -rf * .[^.]* || true

    - uses: actions/checkout@v4

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Compute Tag
      run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Get ACR Login Server
      id: acr
      run: |
        LOGIN_SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
        echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_ENV
        echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_OUTPUT

    - name: Set Image Name
      id: set-image
      run: |
        IMAGE=$LOGIN_SERVER/$ACR_REPO:$TAG
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV
        echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - uses: docker/setup-buildx-action@v3

    - name: Build Image
      run: docker buildx build --platform linux/amd64 --load -t $IMAGE .

    - name: Push Image
      run: docker push $IMAGE


# ==========================
# DEPLOY JOB
# ==========================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: master

    steps:

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

# --------------------------
# INFRA SETUP
# --------------------------

    - name: Ensure Resource Group
      run: |
        az group create --name $RG_ENV --location $LOCATION

    - name: Ensure Log Analytics Workspace
      run: |
        LAW_NAME="${APP_NAME}-logs"

        EXISTS=$(az monitor log-analytics workspace show \
          --resource-group $RG_ENV \
          --workspace-name $LAW_NAME \
          --query name -o tsv 2>/dev/null || echo "")

        if [ -z "$EXISTS" ]; then
          echo "Creating Workspace..."
          az monitor log-analytics workspace create \
            --resource-group $RG_ENV \
            --workspace-name $LAW_NAME \
            --location $LOCATION
        else
          echo "Workspace exists"
        fi

    - name: Get Workspace Details
      run: |
        LAW_NAME="${APP_NAME}-logs"

        LAW_ID=$(az monitor log-analytics workspace show \
          --resource-group $RG_ENV \
          --workspace-name $LAW_NAME \
          --query customerId -o tsv)

        LAW_KEY=$(az monitor log-analytics workspace get-shared-keys \
          --resource-group $RG_ENV \
          --workspace-name $LAW_NAME \
          --query primarySharedKey -o tsv)

        echo "LAW_ID=$LAW_ID" >> $GITHUB_ENV
        echo "LAW_KEY=$LAW_KEY" >> $GITHUB_ENV

    - name: Ensure Container App Environment (CAE)
      run: |
        EXISTS=$(az containerapp env show \
          --name $CAE_ENV \
          --resource-group $RG_ENV \
          --query name -o tsv 2>/dev/null || echo "")

        if [ -z "$EXISTS" ]; then
          echo "Creating CAE..."
          az containerapp env create \
            --name $CAE_ENV \
            --resource-group $RG_ENV \
            --location $LOCATION \
            --logs-workspace-id $LAW_ID \
            --logs-workspace-key $LAW_KEY
        else
          echo "CAE exists"
        fi

# --------------------------
# APP SETUP (FIXED ORDER)
# --------------------------

    - name: Ensure Container App (NO ACR YET)
      run: |
        EXISTS=$(az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query name -o tsv 2>/dev/null || echo "")

        if [ -z "$EXISTS" ]; then
          echo "Creating Container App..."
          az containerapp create \
            --name $APP_NAME \
            --resource-group $RG_ENV \
            --environment $CAE_ENV \
            --image mcr.microsoft.com/azuredocs/containerapps-helloworld:latest \
            --target-port $APP_PORT \
            --ingress $INGRESS_TYPE \
            --min-replicas 1 \
            --max-replicas 2 \
            --system-assigned
        else
          echo "Container App exists"
        fi

    - name: Assign AcrPull Role
      run: |
        PRINCIPAL_ID=$(az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query identity.principalId -o tsv)

        ACR_ID=$(az acr show --name $ACR_NAME --query id -o tsv)

        az role assignment create \
          --assignee $PRINCIPAL_ID \
          --role AcrPull \
          --scope $ACR_ID || echo "Role already exists"

    - name: Configure ACR Access
      run: |
        az containerapp registry set \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --server ${{ needs.build.outputs.LOGIN_SERVER }} \
          --identity system

    - name: Deploy Image
      run: |
        az containerapp update \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --image ${{ needs.build.outputs.IMAGE }}

    - name: Show Status
      run: |
        az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query "{state:properties.provisioningState,fqdn:properties.configuration.ingress.fqdn}" \
          -o table
