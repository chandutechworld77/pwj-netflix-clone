name: dev-deploy-llm (ACA + LLM CI/CD)

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: aca-master-${{ github.repository }}
  cancel-in-progress: true

env:
  RG_ENV: ${{ vars.RG_ENV }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_REPO: ${{ vars.ACR_REPO }}
  APP_NAME: ${{ vars.APP_NAME }}
  CAE_ENV: ${{ vars.CAE_ENV }}
  INGRESS_TYPE: ${{ vars.INGRESS_TYPE }}
  APP_PORT: ${{ vars.APP_PORT }}

  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  QUALITY_THRESHOLD: 0.5

jobs:

# ==========================
# LLM VALIDATION + EVALUATION
# ==========================
  llm-evaluate:
    name: LLM Prompt Evaluation
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate Prompts
      run: |
        echo "Validating prompts..."
        for file in prompts/*.txt; do
          if [ ! -s "$file" ]; then
            echo "❌ Empty prompt file: $file"
            exit 1
          fi
        done

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: pip install openai numpy

    - name: Run LLM Evaluation
      id: eval
      run: |
        python scripts/evaluate.py > results.txt
        cat results.txt

        SCORE=$(grep "FINAL_SCORE" results.txt | cut -d '=' -f2)
        echo "score=$SCORE" >> $GITHUB_OUTPUT

    - name: Quality Gate
      run: |
        echo "Score: ${{ steps.eval.outputs.score }}"
        if (( $(echo "${{ steps.eval.outputs.score }} < $QUALITY_THRESHOLD" | bc -l) )); then
          echo "❌ LLM Quality check failed"
          exit 1
        fi


# ==========================
# BUILD JOB
# ==========================
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: llm-evaluate
    environment: master

    outputs:
      IMAGE: ${{ steps.set-image.outputs.IMAGE }}
      LOGIN_SERVER: ${{ steps.acr.outputs.LOGIN_SERVER }}

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Compute Image Tag
      id: tag
      run: |
        TAG=${GITHUB_SHA::7}
        echo "TAG=$TAG" >> $GITHUB_ENV

    - name: Get ACR Login Server
      id: acr
      run: |
        LOGIN_SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
        echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_ENV
        echo "LOGIN_SERVER=$LOGIN_SERVER" >> $GITHUB_OUTPUT

    - name: Define Image Name
      id: set-image
      run: |
        IMAGE=$LOGIN_SERVER/$ACR_REPO:$TAG
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV
        echo "IMAGE=$IMAGE" >> $GITHUB_OUTPUT

    - name: ACR Login
      run: az acr login --name $ACR_NAME

    - name: Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker buildx build \
          --platform linux/amd64 \
          --load \
          -t $IMAGE .

    - name: Push Docker Image
      run: docker push $IMAGE


# ==========================
# DEPLOY JOB
# ==========================
  deploy:
    name: Deploy to ACA
    runs-on: ubuntu-latest
    needs: build
    environment: master

    steps:

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Ensure Container App
      run: |
        EXISTS=$(az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query name -o tsv 2>/dev/null || echo "")

        if [ -z "$EXISTS" ]; then
          az containerapp create \
            --name $APP_NAME \
            --resource-group $RG_ENV \
            --environment $CAE_ENV \
            --image mcr.microsoft.com/azuredocs/containerapps-helloworld:latest \
            --target-port $APP_PORT \
            --ingress $INGRESS_TYPE \
            --min-replicas 1 \
            --max-replicas 2 \
            --registry-server ${{ needs.build.outputs.LOGIN_SERVER }} \
            --system-assigned
        fi

    - name: Assign AcrPull Role
      run: |
        PRINCIPAL_ID=$(az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query identity.principalId -o tsv)

        ACR_ID=$(az acr show --name $ACR_NAME --query id -o tsv)

        az role assignment create \
          --assignee $PRINCIPAL_ID \
          --role AcrPull \
          --scope $ACR_ID || echo "Role exists"

    - name: Configure Registry
      run: |
        az containerapp registry set \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --server ${{ needs.build.outputs.LOGIN_SERVER }} \
          --identity system

    - name: Deploy Image
      run: |
        az containerapp update \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --image ${{ needs.build.outputs.IMAGE }}

    - name: Show Status
      run: |
        az containerapp show \
          --name $APP_NAME \
          --resource-group $RG_ENV \
          --query "{state:properties.provisioningState,fqdn:properties.configuration.ingress.fqdn}" \
          -o table
